<html manifest="ps4jb.cache">
  <head>
    <meta charset="utf-8">
    <title>PS4 Jailbreak</title>
    <style>
      body {
        background-color: #000000;
        color: #ffffff;
        font-family: "Segoe UI", Tahoma, sans-serif;
        text-align: center;
      }
      .container {
		position: relative;
		z-index: 2;
		display: flex;
		flex-direction: column;
		justify-content: center;
		align-items: center;
        }
      .header-section {
		text-align: center;
      }
      .main-title {
		background: linear-gradient(45deg, #ff00aa, #00ffff, #ff00ff, #00ff9d);
		background-size: 300% 300%;
		-webkit-background-clip: text;
		-webkit-text-fill-color: transparent;
		animation: gradientFlow 8s ease infinite;
		text-shadow: 0 0 30px rgba(255, 0, 170, 0.7);
      }
      @keyframes gradientFlow {
		0% {background-position: 0% 50%;}
		50% {background-position: 100% 50%;}
		100% {background-position: 0% 50%;}
      }
      #console {
        font-family: monospace;
        color: #ffffff;
        padding: 12px;
        font-size: 18px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <div class="container">
        <div class="header-section">
            <h1 class="main-title">Auto JB PS4 5.05, 6.70 - 9.60</h1>
        </div>
    </div>
    <div style='text-align:left;position:fixed;left:10px;bottom:10px;width:100%;font-size:12px;color:#888'><center>Special Thanks to:<br><strong> TheFloW - SpecterDev  -ChendoChap - Znullptr - Sleirsgoevy - SiSTRo - Feyzee - CM<br>And everyone who helps improve the PS4 scene</strong></center></font></div>
	<pre id="console"></pre>
  </body>
  <script>
    // Clear history and prevent back navigation
    history.replaceState(null, null, 'index.html');
    var histlength = history.length;
    history.go(-histlength);
    // Logging utility
    var outputConsole = document.getElementById("console");
    window.log = function (msg) {
      outputConsole.textContent += msg + "\n";
    };
    // Download progress (% display)
    function DLProgress(e) {
      if (!e || !e.total) return;
      var percent = (Math.round((e.loaded / e.total) * 100));
      window.log("[CACHE] Downloading... " + percent + "% complete.");
    }
    // On cache complete
    function DisplayCacheProgress() {
      window.log(" ");
      window.log("[SUCCESS] Cache berhasil diinstall.");
      // Delay to show success message before navigation
      setTimeout(function() { window.log("Reloading..."); }, 2000);
      // Navigate back to index.html to load the exploit from cache
      setTimeout(function() { location.reload(); }, 3000);
    }
    // On error
    function DLError(e) {
      window.log(" ");
      window.log("[CACHE ERROR] An error occured during Cache...");
    }
    // Event listeners
    window.applicationCache.addEventListener("progress", DLProgress, false);
    window.applicationCache.addEventListener("error", DLError, false);
    window.applicationCache.oncached = function(e) { DisplayCacheProgress(); };
    window.applicationCache.onupdateready = function(e) { DisplayCacheProgress(); };
  </script>
</html>
